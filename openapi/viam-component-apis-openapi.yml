            schema:
              type: object
              required: [name, distance_mm, mm_per_sec]
              properties: { name: { type: string }, distance_mm: { type: integer }, mm_per_sec: { type: number } }
      responses: { '200': { description: Successful response. } }
  /viam.component.base.v1.BaseService/Spin:
    post:
