          application/json:
            schema:
              type: object
              required: [name, angle_deg, degs_per_sec]
              properties: { name: { type: string }, angle_deg: { type: number }, degs_per_sec: { type: number } }
      responses: { '200': { description: Successful response. } }
  /viam.component.base.v1.BaseService/SetPower:
    post:
