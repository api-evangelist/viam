              required: [name, positions]
              properties: { name: { type: string }, positions: { type: object } }
      responses: { '200': { description: Successful response. } }
  /viam.component.arm.v1.ArmService/Stop:
    post:
      summary: Viam Arm Stop
      description: Stop the arm.
      operationId: armStop
      tags: [Arm]
      requestBody:
        required: true
        content:
